services:
  poll:    
    build: ./poll
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
    ports: 
      - '5002:80'
    environment:
      - REDIS_HOST=redis
    networks:
      - poll-tier
  redis:
    image: redis:7
    ports: 
      - '6379:6379'
    networks:
      - poll-tier
      - back-tier
  worker:
    build: ./worker
    networks:
      - back-tier
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
  db:
    image: postgres:16
    ports:
      - '5432:5432'
    healthcheck:
          test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
          interval: 10s
          retries: 5
          start_period: 30s
          timeout: 10s
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - result-tier
      - back-tier
  result:
    build: ./result
    ports:
      - '5001:80'
    networks:
      - result-tier
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=${DATABASE_URL}
networks:
  poll-tier:
  result-tier:
  back-tier:
volumes:
  postgres-data:

